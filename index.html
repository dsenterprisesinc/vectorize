<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vectorize</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:    #1c1410;
  --cream:  #e8d5b7;
  --paper:  #f2e4cc;
  --gold:   #b8862a;
  --gold-lt:#d4a84b;
  --muted:  #b0a090;
  --rule:   #3a2e24;
  --shadow: rgba(28,20,16,0.10);
}

body {
  background: #1c1410;
  color: #ffffff;
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  min-height: 100vh;
}

.wrap {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 20px 24px;
}

/* ── Header ── */
header { padding: 28px 0 20px; border-bottom: 1px solid var(--rule); margin-bottom: 20px; }
.eyebrow { font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem,6vw,3.2rem); font-weight: 300; line-height: 1.05; margin-left: -0.05em; }
header h1 em { font-style: italic; color: var(--gold); }
.subtitle { margin-top: 8px; font-size: 14px; color: var(--muted); letter-spacing: 0.08em; }

/* ── Upload Panel ── */
.panel {
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 3px; padding: 20px; margin-bottom: 0;
  box-shadow: 0 2px 10px var(--shadow);
}
.panel h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 14px; color: #1c1410; }

.drop-zone {
  border: 2px dashed #c4a882; border-radius: 3px;
  padding: 20px; text-align: center; cursor: pointer;
  transition: all 0.2s; background: #f5ede0; margin-bottom: 12px;
}
.drop-zone:hover, .drop-zone.over { border-color: var(--gold); background: #eedfc0; }
.drop-zone input[type=file] { display: none; }
.drop-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }
.drop-text { font-size: 14px; color: var(--muted); line-height: 1.5; }
.drop-text strong { color: var(--ink); }

.camera-row { display: flex; gap: 10px; margin-bottom: 14px; }
.btn-camera {
  flex: 1; padding: 10px; background: #f5ede0; border: 1px solid #c4a882;
  border-radius: 2px; cursor: pointer; font-family: 'DM Mono', monospace;
  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  color: #1c1410; transition: all 0.2s;
}
.btn-camera:hover { background: var(--gold); border-color: var(--gold); color: #1c1410; }

label.lbl { display: block; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
input[type=text] {
  width: 100%; background: var(--cream); border: 1px solid var(--rule);
  border-radius: 2px; padding: 8px 12px;
  font-family: 'DM Mono', monospace; font-size: 14px; color: var(--ink);
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: var(--gold); }

.threshold-row { margin-bottom: 14px; }

.ink-options { display: flex; gap: 10px; margin-top: 6px; }
.ink-opt {
  flex: 1; padding: 9px;
  background: #f5ede0; border: 1px solid #c4a882;
  border-radius: 2px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 12px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: #1c1410; transition: all 0.2s;
}
.ink-opt:hover { background: var(--gold); border-color: var(--gold); color: #1c1410; }
.ink-opt.active { background: var(--gold); color: #1c1410; border-color: var(--gold); }

.filename-row { margin-bottom: 0; }

/* ── Preview ── */
.preview-section {
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 3px; padding: 28px; margin-bottom: 36px;
  box-shadow: 0 2px 10px var(--shadow); display: none;
}
.preview-section.visible { display: block; animation: fadeUp 0.35s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.preview-section h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 18px; }

#preview-canvas {
  width: 100%; border: 1px solid var(--rule); border-radius: 2px; display: block;
  background-color: white;
  background-image: linear-gradient(45deg, #ddd 25%, transparent 25%),
                    linear-gradient(-45deg, #ddd 25%, transparent 25%),
                    linear-gradient(45deg, transparent 75%, #ddd 75%),
                    linear-gradient(-45deg, transparent 75%, #ddd 75%);
  background-size: 16px 16px;
  background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
}

.preview-actions { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
.btn-download {
  flex: 1; padding: 14px; background: var(--gold); color: var(--ink);
  border: none; border-radius: 2px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 13px;
  letter-spacing: 0.16em; text-transform: uppercase;
  transition: background 0.2s; min-width: 160px;
}
.btn-download:hover { background: var(--gold-lt); }
.btn-download:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-again {
  padding: 14px 20px; background: none; border: 1px solid var(--rule);
  border-radius: 2px; cursor: pointer; font-family: 'DM Mono', monospace;
  font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); transition: all 0.2s;
}
.btn-again:hover { border-color: var(--ink); color: var(--ink); }

#status { font-size: 13px; min-height: 18px; margin-top: 14px; letter-spacing: 0.06em; color: var(--muted); }
#status.err { color: #9a3a3a; }

.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid var(--rule); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

footer { margin-top: 20px; padding: 16px 0; border-top: 1px solid var(--rule); text-align: center; font-size: 13px; color: var(--muted); letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Image Processing</div>
    <h1><em>Vectorize</em></h1>
    <p class="subtitle">Upload any image — get a clean transparent PNG.</p>
  </header>

  <div class="panel">
    <h2>Upload an Image</h2>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])">
      <div class="drop-icon">⬡</div>
      <div class="drop-text">
        <strong>Tap to choose an image</strong><br>
        or drag & drop here — any image type
      </div>
    </div>

    <div class="camera-row">
      <button class="btn-camera" onclick="document.getElementById('camera-input').click()">
        📷 &nbsp;Take Photo
      </button>
      <input type="file" id="camera-input" accept="image/*" capture="environment"
             style="display:none" onchange="handleFile(this.files[0])">
    </div>

    <div class="threshold-row">
      <label class="lbl">Ink Style</label>
      <div class="ink-options">
        <button class="ink-opt" data-value="10" onclick="selectInk(this)">Light</button>
        <button class="ink-opt active" data-value="18" onclick="selectInk(this)">Normal</button>
        <button class="ink-opt" data-value="35" onclick="selectInk(this)">Bold</button>
      </div>
    </div>

    <div class="filename-row">
      <label class="lbl">Filename</label>
      <input type="text" id="filename" placeholder="vectorized">
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-section" id="preview-section">
    <h2>Preview</h2>
    <canvas id="preview-canvas"></canvas>
    <div class="preview-actions">
      <button class="btn-download" id="dl-btn" onclick="downloadPng()">↓ Download PNG</button>
      <button class="btn-again" onclick="reprocess()">↺ Re-process</button>
      <button class="btn-again" onclick="resetPreview()">Try Another</button>
    </div>
    <div id="status"></div>
  </div>

  <footer>Vectorize &nbsp;·&nbsp; Built with love</footer>
</div>

<script>
let currentCanvas = null;
let lastDataUrl = null;

// ── File handling ─────────────────────────────────────────────────────
async function handleFile(file) {
  if (!file) return;

  // Auto-fill filename from file
  const base = file.name.replace(/\.[^.]+$/, '');
  if (!document.getElementById('filename').value) {
    document.getElementById('filename').value = base + '_vectorized';
  }

  showPreview();
  setStatus('<span class="spinner"></span>Loading image…');

  try {
    const dataUrl = await fileToBase64(file);
    lastDataUrl = dataUrl;
    await vectorizeAndRender(dataUrl);
    setStatus('');
  } catch(err) {
    setStatus('Error: ' + err.message, 'err');
    console.error(err);
  }
}

// ── Vectorization pipeline ────────────────────────────────────────────

function extractInkMask(pixels, w, h, threshold) {
  const gray = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    gray[i] = pixels[i*4]*0.299 + pixels[i*4+1]*0.587 + pixels[i*4+2]*0.114;
  }

  function gaussBlur(src, r) {
    const dst = new Float32Array(src.length);
    const k = []; let ks = 0;
    for (let i=-r;i<=r;i++) { const v=Math.exp(-(i*i)/(2*r*r)); k.push(v); ks+=v; }
    for (let i=0;i<k.length;i++) k[i]/=ks;
    const tmp = new Float32Array(src.length);
    for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
      let s=0; for (let ki=0;ki<k.length;ki++) s+=src[y*w+Math.min(w-1,Math.max(0,x+ki-r))]*k[ki];
      tmp[y*w+x]=s;
    }
    for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
      let s=0; for (let ki=0;ki<k.length;ki++) s+=tmp[Math.min(h-1,Math.max(0,y+ki-r))*w+x]*k[ki];
      dst[y*w+x]=s;
    }
    return dst;
  }

  const largeBg = gaussBlur(gray, 18);
  const smallBg = gaussBlur(gray, 3);
  const ink = new Uint8Array(w * h);
  for (let i=0;i<w*h;i++) {
    if ((largeBg[i]-gray[i])>threshold && (smallBg[i]-gray[i])>threshold*0.65) ink[i]=1;
  }

  function dilate(src) {
    const dst=new Uint8Array(src.length);
    for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
      if (src[y*w+x]) { dst[y*w+x]=1; continue; }
      for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
        const ny=y+dy,nx=x+dx;
        if (ny>=0&&ny<h&&nx>=0&&nx<w&&src[ny*w+nx]) dst[y*w+x]=1;
      }
    }
    return dst;
  }
  function erode(src) {
    const dst=new Uint8Array(src.length);
    for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
      if (!src[y*w+x]) continue;
      let ok=true;
      for (let dy=-1;dy<=1&&ok;dy++) for (let dx=-1;dx<=1&&ok;dx++) {
        const ny=y+dy,nx=x+dx;
        if (ny<0||ny>=h||nx<0||nx>=w||!src[ny*w+nx]) ok=false;
      }
      if (ok) dst[y*w+x]=1;
    }
    return dst;
  }

  return erode(dilate(dilate(ink)));
}

function skeletonize(ink, w, h) {
  const skel = new Uint8Array(ink);
  let changed = true;
  while (changed) {
    changed = false;
    for (let pass=0;pass<2;pass++) {
      const rem=[];
      for (let y=1;y<h-1;y++) for (let x=1;x<w-1;x++) {
        if (!skel[y*w+x]) continue;
        const p=(dy,dx)=>skel[(y+dy)*w+(x+dx)]?1:0;
        const p2=p(-1,0),p3=p(-1,1),p4=p(0,1),p5=p(1,1),
              p6=p(1,0),p7=p(1,-1),p8=p(0,-1),p9=p(-1,-1);
        const B=p2+p3+p4+p5+p6+p7+p8+p9;
        if (B<2||B>6) continue;
        let A=0;
        if(!p2&&p3)A++;if(!p3&&p4)A++;if(!p4&&p5)A++;if(!p5&&p6)A++;
        if(!p6&&p7)A++;if(!p7&&p8)A++;if(!p8&&p9)A++;if(!p9&&p2)A++;
        if (A!==1) continue;
        if (pass===0&&(p2*p4*p6)) continue;
        if (pass===0&&(p4*p6*p8)) continue;
        if (pass===1&&(p2*p4*p8)) continue;
        if (pass===1&&(p2*p6*p8)) continue;
        rem.push(y*w+x);
      }
      if (rem.length) { changed=true; for (const i of rem) skel[i]=0; }
    }
  }
  return skel;
}

function traceStrokes(skel, w, h) {
  const pts=new Set();
  for (let i=0;i<w*h;i++) if (skel[i]) pts.add(i);

  function nbrs(idx) {
    const y=Math.floor(idx/w),x=idx%w,res=[];
    for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
      if (!dy&&!dx) continue;
      const ni=(y+dy)*w+(x+dx);
      if (pts.has(ni)) res.push(ni);
    }
    return res;
  }

  const endpoints=[];
  for (const idx of pts) if (nbrs(idx).length===1) endpoints.push(idx);

  const visited=new Set();
  const strokes=[];

  function traceFrom(start) {
    const path=[start]; visited.add(start);
    let prev=-1,cur=start;
    while (true) {
      const nbs=nbrs(cur).filter(n=>!visited.has(n));
      if (!nbs.length) break;
      let nxt=nbs[0];
      if (prev>=0&&nbs.length>1) {
        const pdy=Math.floor(cur/w)-Math.floor(prev/w),pdx=(cur%w)-(prev%w);
        nxt=nbs.reduce((b,n)=>{
          const dy=Math.floor(n/w)-Math.floor(cur/w),dx=(n%w)-(cur%w);
          const bdy=Math.floor(b/w)-Math.floor(cur/w),bdx=(b%w)-(cur%w);
          return (dy*pdy+dx*pdx)>(bdy*pdy+bdx*pdx)?n:b;
        });
      }
      const dy=Math.floor(nxt/w)-Math.floor(cur/w),dx=(nxt%w)-(cur%w);
      if (Math.sqrt(dy*dy+dx*dx)>15) break;
      visited.add(nxt); path.push(nxt); prev=cur; cur=nxt;
    }
    return path;
  }

  for (const ep of endpoints) if (!visited.has(ep)) { const s=traceFrom(ep); if (s.length>=4) strokes.push(s); }
  for (const idx of pts) if (!visited.has(idx)) { const s=traceFrom(idx); if (s.length>=4) strokes.push(s); }

  return strokes.map(s=>s.map(idx=>[idx%w,Math.floor(idx/w)]));
}

function renderStrokes(strokes, inkMask, maskW, maskH, canvas) {
  const scale=canvas.width/maskW;
  const inkPx=inkMask.reduce((a,b)=>a+b,0);
  const skelPx=strokes.reduce((a,s)=>a+s.length,0);
  const strokeW=Math.max(3,Math.min(24,(inkPx/Math.max(skelPx,1))*scale*0.85));

  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#1c1410';
  ctx.lineWidth=strokeW;
  ctx.lineCap='round';
  ctx.lineJoin='round';

  for (const stroke of strokes) {
    if (stroke.length<2) continue;
    const step=Math.max(1,Math.floor(stroke.length/60));
    const sp=[];
    for (let i=0;i<stroke.length;i+=step) sp.push(stroke[i]);
    if (sp[sp.length-1]!==stroke[stroke.length-1]) sp.push(stroke[stroke.length-1]);

    ctx.beginPath();
    ctx.moveTo(sp[0][0]*scale,sp[0][1]*scale);
    for (let i=1;i<sp.length;i++) {
      const p0=sp[Math.max(0,i-2)],p1=sp[i-1],p2=sp[i],p3=sp[Math.min(sp.length-1,i+1)];
      const t=0.4;
      ctx.bezierCurveTo(
        p1[0]*scale+t*(p2[0]-p0[0])*scale/3, p1[1]*scale+t*(p2[1]-p0[1])*scale/3,
        p2[0]*scale-t*(p3[0]-p1[0])*scale/3, p2[1]*scale-t*(p3[1]-p1[1])*scale/3,
        p2[0]*scale, p2[1]*scale
      );
    }
    ctx.stroke();
  }
}

async function vectorizeAndRender(dataUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const iw=img.naturalWidth, ih=img.naturalHeight;
      const threshold=getThreshold();

      const off=document.createElement('canvas');
      off.width=iw; off.height=ih;
      off.getContext('2d').drawImage(img,0,0);
      const pixels=off.getContext('2d').getImageData(0,0,iw,ih).data;

      setStatus('<span class="spinner"></span>Extracting ink…');
      setTimeout(()=>{
        try {
          const inkMask=extractInkMask(pixels,iw,ih,threshold);
          setStatus('<span class="spinner"></span>Vectorizing…');
          setTimeout(()=>{
            try {
              const skel=skeletonize(inkMask,iw,ih);
              const strokes=traceStrokes(skel,iw,ih);
              const outW=1000, outH=Math.round(ih*(outW/iw));
              const canvas=document.getElementById('preview-canvas');
              canvas.width=outW; canvas.height=outH;
              renderStrokes(strokes,inkMask,iw,ih,canvas);
              currentCanvas=canvas;
              resolve();
            } catch(e){reject(e);}
          },30);
        } catch(e){reject(e);}
      },30);
    };
    img.onerror=reject;
    img.src=dataUrl;
  });
}

// ── Re-process with current slider value ─────────────────────────────
async function reprocess() {
  if (!lastDataUrl) return;
  setStatus('<span class="spinner"></span>Re-processing…');
  try {
    await vectorizeAndRender(lastDataUrl);
    setStatus('');
  } catch(err) {
    setStatus('Error: ' + err.message, 'err');
  }
}

// ── Download ──────────────────────────────────────────────────────────
function downloadPng() {
  if (!currentCanvas) return;
  const name = (document.getElementById('filename').value.trim() || 'vectorized')
    .replace(/\.png$/i,'');
  const a=document.createElement('a');
  a.download=`${name}.png`;
  a.href=currentCanvas.toDataURL('image/png');
  a.click();
}

// ── Drag & drop ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const z=document.getElementById('drop-zone');
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('over');});
  z.addEventListener('dragleave',()=>z.classList.remove('over'));
  z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('over');const f=e.dataTransfer.files[0];if(f)handleFile(f);});
});

// ── UI helpers ────────────────────────────────────────────────────────
function showPreview() {
  const s=document.getElementById('preview-section');
  s.classList.add('visible');
  setTimeout(()=>s.scrollIntoView({behavior:'smooth',block:'start'}),50);
}

function resetPreview() {
  document.getElementById('preview-section').classList.remove('visible');
  document.getElementById('file-input').value='';
  document.getElementById('camera-input').value='';
  document.getElementById('filename').value='';
  currentCanvas=null;
  lastDataUrl=null;
  setStatus('');
}

function setStatus(msg,cls) {
  const el=document.getElementById('status');
  el.innerHTML=msg; el.className=cls||'';
}

function selectInk(btn) {
  document.querySelectorAll('.ink-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getThreshold() {
  const active = document.querySelector('.ink-opt.active');
  return active ? parseInt(active.dataset.value) : 18;
}

function fileToBase64(file) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}
</script>
</body>
</html>
